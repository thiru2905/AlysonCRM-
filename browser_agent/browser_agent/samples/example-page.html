<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Professional Profile — Browser Agent Test</title>
    <style>
      body {
        font-family: Georgia, 'Times New Roman', serif;
        max-width: 640px;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #1a1a1a;
        background: #f7f5f0;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.25rem;
      }
      .headline {
        color: #444;
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }
      .meta {
        color: #555;
        margin: 0.35rem 0;
      }
      .label {
        font-weight: bold;
        display: inline-block;
        min-width: 5.5rem;
      }
    </style>
  </head>
  <body>
    <article id="profile" data-testid="professional-profile">
      <h1 id="full-name">Alex Rivera</h1>
      <p class="headline" id="headline">Senior Product Manager · B2B SaaS</p>
      <p class="meta" id="company"><span class="label">Company</span> Northwind Analytics</p>
      <p class="meta" id="location"><span class="label">Location</span> Portland, OR</p>
      <p class="meta" id="profile-url">
        <span class="label">Profile</span>
        <a href="https://example.com/people/alex-rivera">https://example.com/people/alex-rivera</a>
      </p>
      <p>
        Harmless public test page for Browser Agent extraction. No forms, no login, no purchases.
      </p>
    </article>
  </body>
</html>
